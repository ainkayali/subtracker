name: Build APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Unit tests
        run: chmod +x gradlew && ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: subtracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Check release secrets present
        id: release_check
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.KEYSTORE_PASSWORD }}" ] && [ -n "${{ secrets.KEY_ALIAS }}" ] && [ -n "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "Release signing secrets missing — skipping release build."
          fi

      - name: Decode keystore
        if: steps.release_check.outputs.has_secrets == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build release APK
        if: steps.release_check.outputs.has_secrets == 'true'
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Clean keystore
        if: always()
        run: rm -f app/release.keystore

      - name: Upload release APK
        if: steps.release_check.outputs.has_secrets == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: subtracker-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v') && steps.release_check.outputs.has_secrets == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
